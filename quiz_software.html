<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Software Career Quiz</title>
    <script>
        window.addEventListener('error', function(e) {
            const errDiv = document.createElement('div');
            errDiv.style.cssText = "position:fixed; top:0; left:0; width:100%; z-index:9999; background:red; color:white; padding:20px; font-weight:bold;";
            errDiv.innerHTML = "CRITICAL ERROR: " + e.message + " in " + e.filename + " at line " + e.lineno;
            document.body.prepend(errDiv);
        });
    </script>
    <link rel="stylesheet" href="style.css">
    <script src="script.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .question-card { background: #1f2937; padding: 20px; margin-bottom: 20px; border-radius: 8px; border-left: 5px solid var(--neon-blue); animation: fadeIn 0.5s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .options-grid { display: grid; grid-template-columns: 1fr; gap: 10px; margin-top: 15px; }
        .option-label { background: #374151; padding: 15px; border-radius: 5px; cursor: pointer; transition: all 0.2s; display: block; border: 1px solid transparent; }
        .option-label:hover { background: #4b5563; }
        .option-label.selected { background: #1e3a8a; border-color: var(--neon-blue); }
        input[type="radio"] { display: none; }
        #chartContainer { width: 100%; max-width: 600px; margin: 0 auto; margin-bottom: 30px; }
    </style>
</head>
<body>
    <nav>
        <div style="font-weight: bold; color: var(--neon-blue);">
            <a href="home.html" style="color: inherit; text-decoration: none;">CSE PathFinder</a>
        </div>
        <a href="quiz.html" class="btn-secondary" style="padding: 5px 10px; font-size: 0.8rem; text-decoration: none; border-radius: 5px;">Back to Quiz Menu</a>
    </nav>

    <div class="container">
        <h1>Discover Your <span style="color: var(--neon-blue);">Software</span> Domain</h1>

        <div id="quizSection">
            <div id="categoryTabs" style="display: flex; justify-content: space-between; gap: 10px; margin-bottom: 20px; flex-wrap: wrap;">
                <button class="tab-btn active" onclick="switchTab(0)">Orientation</button>
                <button class="tab-btn" onclick="switchTab(1)">Interest</button>
                <button class="tab-btn" onclick="switchTab(2)">Aptitude</button>
            </div>
            
            <div id="tabContent" style="position: relative;">
                <div id="questionContainer"></div>
                
                <div id="categoryResult" class="hidden" style="background: #1f2937; padding: 20px; border-radius: 8px; border-left: 5px solid #10b981; margin-top: 20px;">
                    <h3 style="color: #10b981; margin-top: 0;">Category Analysis</h3>
                    <p id="categoryResultText" style="line-height: 1.6;"></p>
                </div>
            </div>
            <p style="text-align: center; margin-bottom: 20px;">Question <span id="currentQNum">1</span> of <span id="totalQuestions"></span></p>
            <div id="progressBar" style="width: 100%; height: 5px; background: #374151; margin-bottom: 30px; border-radius: 5px;">
                <div id="progressFill" style="width: 0%; height: 100%; background: var(--neon-blue); border-radius: 5px; transition: width 0.3s;"></div>
            </div>

            <div style="text-align: center; margin-top: 30px; display: flex; justify-content: space-between;">
                <button id="prevBtn" class="btn-secondary" onclick="prevQuestion()" disabled>Previous</button>
                <button id="nextBtn" class="btn" onclick="nextQuestion()">Next</button>
            </div>
            <div style="text-align: center; margin-top: 20px;">
                <button id="finishQuizBtn" class="btn hidden" onclick="showFinalResults()" style="width: 100%; background: #10b981;">Finish Entire Quiz</button>
            </div>
        </div>

    </div>

    <script src="quiz_software.js"></script>
</body>
</html>
