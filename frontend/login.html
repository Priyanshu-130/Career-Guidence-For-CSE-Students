<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - CSE PathFinder</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .auth-container {
            max-width: 420px;
            margin: 0 auto;
            padding-top: 60px;
        }
        .auth-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 35px 30px;
            box-shadow: 0 0 30px rgba(0, 243, 255, 0.05);
        }
        .auth-tabs {
            display: flex;
            gap: 0;
            margin-bottom: 30px;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid var(--border-color);
        }
        .auth-tab {
            flex: 1;
            padding: 12px;
            text-align: center;
            cursor: pointer;
            background: transparent;
            color: var(--text-primary);
            border: none;
            font-size: 1rem;
            font-weight: bold;
            transition: all 0.3s;
        }
        .auth-tab.active {
            background: var(--neon-blue);
            color: black;
        }
        .auth-tab:not(.active):hover {
            background: rgba(0, 243, 255, 0.1);
        }
        .form-group {
            margin-bottom: 16px;
        }
        .form-group label {
            display: block;
            margin-bottom: 6px;
            color: #9ca3af;
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .form-group input, .form-group select {
            width: 100%;
            padding: 11px 14px;
            background: #0d1117;
            border: 1px solid var(--border-color);
            color: white;
            border-radius: 6px;
            font-size: 0.95rem;
            box-sizing: border-box;
            transition: border-color 0.3s;
        }
        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: var(--neon-blue);
            box-shadow: 0 0 8px rgba(0, 243, 255, 0.15);
        }
        .auth-submit {
            width: 100%;
            padding: 13px;
            background: var(--neon-blue);
            color: black;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 10px;
            transition: all 0.3s;
        }
        .auth-submit:hover {
            box-shadow: 0 0 25px var(--neon-blue);
            transform: translateY(-2px);
        }
        .auth-submit:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        .auth-error {
            background: rgba(239, 68, 68, 0.15);
            border: 1px solid #ef4444;
            color: #fca5a5;
            padding: 10px 14px;
            border-radius: 6px;
            margin-bottom: 16px;
            font-size: 0.9rem;
            display: none;
        }
        .auth-success {
            background: rgba(16, 185, 129, 0.15);
            border: 1px solid #10b981;
            color: #6ee7b7;
            padding: 10px 14px;
            border-radius: 6px;
            margin-bottom: 16px;
            font-size: 0.9rem;
            display: none;
        }
        .brand-title {
            text-align: center;
            margin-bottom: 6px;
            font-size: 1.8rem;
            color: var(--neon-blue);
            text-shadow: 0 0 15px rgba(0, 243, 255, 0.3);
        }
        .brand-subtitle {
            text-align: center;
            color: #6b7280;
            margin-bottom: 30px;
            font-size: 0.95rem;
        }
        .form-row {
            display: flex;
            gap: 12px;
        }
        .form-row .form-group {
            flex: 1;
        }
    </style>
</head>

<body>

    <div class="auth-container">
        <h2 class="brand-title">CSE PathFinder</h2>
        <p class="brand-subtitle">Career Guidance for CSE Students</p>

        <div class="auth-card">
            <div class="auth-tabs">
                <button class="auth-tab active" id="loginTab" onclick="showLoginForm()">Login</button>
                <button class="auth-tab" id="registerTab" onclick="showRegisterForm()">Register</button>
            </div>

            <div id="authError" class="auth-error"></div>
            <div id="authSuccess" class="auth-success"></div>

            <form id="loginForm" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="loginEmail" placeholder="you@college.edu" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="loginPassword" placeholder="Enter your password" required>
                </div>
                <button type="submit" class="auth-submit" id="loginBtn">Login</button>
            </form>

            <form id="registerForm" style="display: none;" onsubmit="handleRegister(event)">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="regName" placeholder="Your full name" required>
                </div>
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="regEmail" placeholder="you@college.edu" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="regPassword" placeholder="Create a password" minlength="4" required>
                </div>
                <div class="form-group">
                    <label>College / University</label>
                    <input type="text" id="regCollege" placeholder="Your college name" required>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Year</label>
                        <select id="regYear" required>
                            <option value="">Select</option>
                            <option value="1st Year">1st Year</option>
                            <option value="2nd Year">2nd Year</option>
                            <option value="3rd Year">3rd Year</option>
                            <option value="4th Year">4th Year</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Branch</label>
                        <select id="regBranch" required>
                            <option value="">Select</option>
                            <option value="CSE">CSE</option>
                            <option value="IT">IT</option>
                            <option value="ECE">ECE</option>
                            <option value="EEE">EEE</option>
                            <option value="MECH">MECH</option>
                            <option value="CIVIL">CIVIL</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>
                </div>
                <button type="submit" class="auth-submit" id="registerBtn">Create Account</button>
            </form>
        </div>
    </div>

    <script>
        const API_BASE = "http://127.0.0.1:5000";

        const student = sessionStorage.getItem("cse_student");
        if (student) {
            window.location.href = "home.html";
        }

        function showLoginForm() {
            document.getElementById("loginForm").style.display = "block";
            document.getElementById("registerForm").style.display = "none";
            document.getElementById("loginTab").classList.add("active");
            document.getElementById("registerTab").classList.remove("active");
            clearMessages();
        }

        function showRegisterForm() {
            document.getElementById("loginForm").style.display = "none";
            document.getElementById("registerForm").style.display = "block";
            document.getElementById("registerTab").classList.add("active");
            document.getElementById("loginTab").classList.remove("active");
            clearMessages();
        }

        function clearMessages() {
            document.getElementById("authError").style.display = "none";
            document.getElementById("authSuccess").style.display = "none";
        }

        function showError(msg) {
            const el = document.getElementById("authError");
            el.textContent = msg;
            el.style.display = "block";
            document.getElementById("authSuccess").style.display = "none";
        }

        function showSuccess(msg) {
            const el = document.getElementById("authSuccess");
            el.textContent = msg;
            el.style.display = "block";
            document.getElementById("authError").style.display = "none";
        }

        async function handleLogin(e) {
            e.preventDefault();
            clearMessages();
            const btn = document.getElementById("loginBtn");
            btn.disabled = true;
            btn.textContent = "Logging in...";

            const email = document.getElementById("loginEmail").value;
            const password = document.getElementById("loginPassword").value;

            try {
                const res = await fetch(API_BASE + "/api/login", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ email, password })
                });
                const data = await res.json();

                if (data.status === "success") {
                    sessionStorage.setItem("cse_student", JSON.stringify(data.student));
                    window.location.href = "home.html";
                } else {
                    showError(data.message);
                }
            } catch (err) {
                showError("Cannot connect to server. Make sure the backend is running.");
            }
            btn.disabled = false;
            btn.textContent = "Login";
        }

        async function handleRegister(e) {
            e.preventDefault();
            clearMessages();
            const btn = document.getElementById("registerBtn");
            btn.disabled = true;
            btn.textContent = "Creating account...";

            const payload = {
                name: document.getElementById("regName").value,
                email: document.getElementById("regEmail").value,
                password: document.getElementById("regPassword").value,
                college: document.getElementById("regCollege").value,
                year: document.getElementById("regYear").value,
                branch: document.getElementById("regBranch").value
            };

            try {
                const res = await fetch(API_BASE + "/api/register", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(payload)
                });
                const data = await res.json();

                if (data.status === "success") {
                    showSuccess("Account created! You can now login.");
                    document.getElementById("registerForm").reset();
                    setTimeout(() => showLoginForm(), 1500);
                } else {
                    showError(data.message);
                }
            } catch (err) {
                showError("Cannot connect to server. Make sure the backend is running.");
            }
            btn.disabled = false;
            btn.textContent = "Create Account";
        }
    </script>

</body>

</html>
