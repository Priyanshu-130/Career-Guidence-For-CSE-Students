<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Career Path Results</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        #chartContainer { width: 100%; max-width: 600px; margin: 0 auto; margin-bottom: 30px; }
    </style>
</head>
<body>
    <nav>
        <div style="font-weight: bold; color: var(--neon-blue);">
            <a href="home.html" style="color: inherit; text-decoration: none;">CSE PathFinder</a>
        </div>
        <a href="quiz.html" class="btn-secondary" style="padding: 5px 10px; font-size: 0.8rem; text-decoration: none; border-radius: 5px;">Back to Quiz Menu</a>
    </nav>
    
    <div class="container" id="resultBlock" style="text-align: center;">
        <h2 id="resultHeading" style="color: var(--neon-blue);">Analysis Complete!</h2>
        
        <div id="primaryResultText" style="text-align: left; max-width: 900px; margin: 0 auto;"></div>
        
        <p style="margin-top: 20px;">Cluster Diagnostic Breakdown:</p>
        <div class="card" id="chartContainer">
            <canvas id="resultChart"></canvas>
        </div>
        
        <h3>Your Top Matches</h3>
        <div id="domainLinks" style="display: flex; flex-direction: column; gap: 10px; max-width: 500px; margin: 0 auto;"></div>
        
        <br><br>
        <a href="quiz.html" class="btn-secondary" style="margin-top: 20px;">Take Another Quiz</a>
    </div>

    <script src="results.js"></script>
</body>
</html>
