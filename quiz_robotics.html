<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Robotics Aptitude Quiz</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js"></script>
</head>
<body>
    <nav>
        <div style="font-weight: bold; color: var(--neon-blue);">
            <a href="home.html" style="color: inherit; text-decoration: none;">CSE PathFinder</a>
        </div>
        <a href="domain_robotics.html" class="btn-secondary" style="padding: 5px 10px; font-size: 0.8rem; text-decoration: none; border-radius: 5px;">Back to Robotics</a>
    </nav>
    <div class="container" style="max-width: 700px;">
        <h1>Is <span style="color: var(--neon-blue);">Robotics & Automation</span> for You?</h1>
        <p style="text-align: center; margin-bottom: 30px;">Take this quick aptitude quiz to see if this domain matches your interests.</p>

        <div id="quizSection">
            <p style="text-align: center; margin-bottom: 20px;">Question <span id="currentQNum">1</span> of <span id="totalQuestions"></span></p>
            <div id="progressBar" style="width: 100%; height: 5px; background: #374151; margin-bottom: 30px; border-radius: 5px;">
                <div id="progressFill" style="width: 0%; height: 100%; background: var(--neon-blue); border-radius: 5px; transition: width 0.3s;"></div>
            </div>
            
            <div id="questionContainer"></div>

            <div style="text-align: center; margin-top: 30px;">
                <button id="nextBtn" class="btn" onclick="nextQuestion()" disabled>Next Question</button>
            </div>
        </div>

        <div id="resultSection" class="hidden card" style="text-align: center; max-width: 500px; margin: 0 auto; padding: 40px 20px;">
            <div id="primaryResultText"></div>
            <br><hr style="border-color: #374151;"><br>
            <a href="quiz_robotics.html" class="btn-secondary">Retake Quiz</a>
        </div>
    </div>

    <script>
        const domainName = "Robotics & Automation";
        const domainLink = "domain_robotics.html";
        const quizData = [
            { q: "Do you like machines that move, automate tasks, and interact with the physical world?" },
            { q: "Are you interested in understanding how motors, actuators, and mechanical joints operate?" },
            { q: "Do you enjoy writing code to control the physical behavior and path-planning of a machine?" },
            { q: "Does the idea of building autonomous robots for industries or healthcare excite you?" }
        ];
    </script>
    <script src="quiz_hardware.js"></script>
</body>
</html>
